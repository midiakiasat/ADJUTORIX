version: 1
policy_id: adjutorix.log-redaction
title: ADJUTORIX Log and Observability Redaction Policy
description: >-
  Canonical machine-readable policy for redacting sensitive material from logs,
  event payloads, diagnostics, command capture, crash reports, metrics,
  governance artifacts, and exported observability bundles across ADJUTORIX.
  This policy defines what is sensitive, how it is detected, which strategy is
  applied, where redaction is mandatory, and how redaction itself is audited.
status: active
owners:
  - team: runtime-security
  - team: core-governance
  - team: runtime-observability
  - team: agent-runtime
default_decision: redact
principles:
  - id: no_plaintext_secret_observability
    statement: No observability surface may retain plaintext credentials, tokens, or private key material.
  - id: redact_before_persist
    statement: Redaction must occur before data is written to any sink, artifact, or transport boundary.
  - id: stable_masking_semantics
    statement: The same sensitive class must be transformed consistently across surfaces unless stricter handling is required.
  - id: minimal_exposure_for_debugging
    statement: Debugging value may preserve fingerprints or bounded prefixes only when policy explicitly allows it.
  - id: auditable_redaction
    statement: Redaction actions must themselves be observable without leaking the hidden material.
shared_enums:
  sink:
    - stdout
    - stderr
    - rotating_file
    - audit_file
    - security_file
    - event_stream
    - crash_report
    - metrics_export
    - diagnostics_payload
    - command_capture
    - release_metadata
    - exported_bundle
  data_class:
    - secret_token
    - oauth_token
    - session_cookie
    - password
    - passphrase
    - private_key
    - api_key
    - cloud_credential
    - signing_identity
    - secret_file_path
    - email_address
    - ip_address
    - absolute_local_path
    - command_argument_sensitive
    - environment_variable_sensitive
    - freeform_unknown_sensitive
  strategy:
    - allow
    - constant_mask
    - prefix4_suffix4
    - fingerprint_only
    - basename_only
    - drop_field
    - drop_record
  privacy_class:
    - public_nonsecret
    - internal_masked
    - audit_masked
    - security_masked
  enforcement:
    - hard_fail
    - redact_and_continue
    - drop_and_continue
classification:
  default_privacy_by_sink:
    stdout: internal_masked
    stderr: internal_masked
    rotating_file: internal_masked
    audit_file: audit_masked
    security_file: security_masked
    event_stream: internal_masked
    crash_report: security_masked
    metrics_export: public_nonsecret
    diagnostics_payload: internal_masked
    command_capture: audit_masked
    release_metadata: audit_masked
    exported_bundle: audit_masked
  strict_sinks:
    - security_file
    - crash_report
    - metrics_export
    - exported_bundle
detection:
  keyword_rules:
    exact_or_contains:
      - token
      - secret
      - password
      - passphrase
      - private_key
      - access_key
      - client_secret
      - auth
      - cookie
      - authorization
      - bearer
  env_prefixes:
    - OPENAI_
    - ANTHROPIC_
    - GEMINI_
    - AWS_
    - AZURE_
    - GCP_
    - SSH_
    - GH_
    - GITHUB_
    - NPM_
    - PYPI_
    - TWINE_
    - SENTRY_
  regexes:
    - id: openai_style_key
      class: api_key
      pattern: 'sk-[A-Za-z0-9]{20,}'
    - id: github_pat
      class: secret_token
      pattern: 'github_pat_[A-Za-z0-9_]{20,}'
    - id: classic_github_token
      class: secret_token
      pattern: 'gh[pousr]_[A-Za-z0-9]{20,}'
    - id: aws_access_key
      class: cloud_credential
      pattern: 'AKIA[0-9A-Z]{16}'
    - id: aws_session_key
      class: cloud_credential
      pattern: 'ASIA[0-9A-Z]{16}'
    - id: slack_token
      class: secret_token
      pattern: 'xox[baprs]-[A-Za-z0-9-]{10,}'
    - id: private_key_header
      class: private_key
      pattern: '-----BEGIN [A-Z ]+PRIVATE KEY-----'
    - id: bearer_header
      class: secret_token
      pattern: '(?i)bearer\s+[A-Za-z0-9._\-]+'
    - id: generic_password_assignment
      class: password
      pattern: '(?i)(password|passphrase)\s*[:=]\s*[^\s]+'
  path_rules:
    absolute_local_path_patterns:
      - '^/Users/[^/]+/.+'
      - '^/home/[^/]+/.+'
      - '^/var/.+'
      - '^/etc/.+'
      - '^[A-Za-z]:\\\\.+'
  email_rules:
    pattern: '[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}'
  ip_rules:
    ipv4_pattern: '\b(?:\d{1,3}\.){3}\d{1,3}\b'
    ipv6_pattern: '\b(?:[0-9a-fA-F]{1,4}:){2,}[0-9a-fA-F:]{1,4}\b'
strategy_matrix:
  secret_token:
    default: constant_mask
    audit_file: fingerprint_only
    security_file: fingerprint_only
    metrics_export: drop_record
  oauth_token:
    default: constant_mask
    audit_file: fingerprint_only
    security_file: fingerprint_only
    metrics_export: drop_record
  session_cookie:
    default: constant_mask
    audit_file: fingerprint_only
    security_file: fingerprint_only
    metrics_export: drop_record
  password:
    default: constant_mask
    audit_file: constant_mask
    security_file: constant_mask
    metrics_export: drop_record
  passphrase:
    default: constant_mask
    audit_file: constant_mask
    security_file: constant_mask
    metrics_export: drop_record
  private_key:
    default: fingerprint_only
    audit_file: fingerprint_only
    security_file: fingerprint_only
    metrics_export: drop_record
  api_key:
    default: prefix4_suffix4
    audit_file: fingerprint_only
    security_file: fingerprint_only
    metrics_export: drop_record
  cloud_credential:
    default: fingerprint_only
    audit_file: fingerprint_only
    security_file: fingerprint_only
    metrics_export: drop_record
  signing_identity:
    default: prefix4_suffix4
    audit_file: fingerprint_only
    security_file: fingerprint_only
    metrics_export: drop_record
  secret_file_path:
    default: basename_only
    audit_file: basename_only
    security_file: basename_only
    metrics_export: drop_record
  email_address:
    default: allow
    security_file: allow
    metrics_export: drop_record
  ip_address:
    default: allow
    security_file: allow
    metrics_export: drop_record
  absolute_local_path:
    default: basename_only
    audit_file: basename_only
    security_file: basename_only
    metrics_export: drop_record
  command_argument_sensitive:
    default: drop_field
    audit_file: drop_field
    security_file: drop_field
    metrics_export: drop_record
  environment_variable_sensitive:
    default: drop_field
    audit_file: drop_field
    security_file: drop_field
    metrics_export: drop_record
  freeform_unknown_sensitive:
    default: constant_mask
    audit_file: constant_mask
    security_file: constant_mask
    metrics_export: drop_record
field_rules:
  exact_paths:
    - path: error.stack
      class: freeform_unknown_sensitive
      strict_strategy: drop_field
    - path: data.argv
      class: command_argument_sensitive
      strict_strategy: drop_field
    - path: data.command
      class: command_argument_sensitive
      strict_strategy: drop_field
    - path: data.command_preview
      class: command_argument_sensitive
      strict_strategy: constant_mask
    - path: data.stdout
      class: freeform_unknown_sensitive
      strict_strategy: constant_mask
    - path: data.stderr
      class: freeform_unknown_sensitive
      strict_strategy: constant_mask
    - path: data.environment
      class: environment_variable_sensitive
      strict_strategy: drop_field
    - path: data.env
      class: environment_variable_sensitive
      strict_strategy: drop_field
    - path: data.token_file
      class: secret_file_path
      strict_strategy: basename_only
  path_patterns:
    - pattern: '(^|\.)token(s)?$'
      class: secret_token
    - pattern: '(^|\.)secret(s)?$'
      class: secret_token
    - pattern: '(^|\.)password$'
      class: password
    - pattern: '(^|\.)passphrase$'
      class: passphrase
    - pattern: '(^|\.)private(_)?key$'
      class: private_key
    - pattern: '(^|\.)authorization$'
      class: secret_token
    - pattern: '(^|\.)cookie$'
      class: session_cookie
    - pattern: '(^|\.)email$'
      class: email_address
    - pattern: '(^|\.)ip$'
      class: ip_address
surface_policies:
  stdout:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  stderr:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  rotating_file:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  audit_file:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  security_file:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  event_stream:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  crash_report:
    enforcement: drop_and_continue
    allow_full_record_drop: true
  metrics_export:
    enforcement: drop_and_continue
    allow_full_record_drop: true
  diagnostics_payload:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  command_capture:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  release_metadata:
    enforcement: redact_and_continue
    allow_full_record_drop: false
  exported_bundle:
    enforcement: hard_fail
    allow_full_record_drop: true
metrics_rules:
  labels:
    forbid_dynamic_sensitive_values: true
    allow_only_declared_labels: true
  values:
    forbid_strings_matching_sensitive_regex: true
    on_match: drop_record
crash_reporting:
  attach_environment: false
  attach_command_output_plaintext: false
  attach_paths_full: false
  require_redaction_before_serialization: true
export_controls:
  pre_export_scan_required: true
  deny_on_unredacted_sensitive_match: true
  deny_on_unknown_sensitive_match: true
  exported_bundle_manifest_must_record_redaction: true
audit:
  emit_redaction_events: true
  redaction_event_name: security.redaction_applied
  required_redaction_event_fields:
    - sink
    - data_class
    - strategy
    - source_surface
    - field_path_or_match_kind
  do_not_store_original_value: true
validation_rules:
  require_strategy_for_all_data_classes: true
  require_sink_policy_for_all_sinks: true
  forbid_allow_strategy_for_secret_token_in_metrics: true
  forbid_none_strategy_for_private_key_anywhere: true
review:
  cadence: quarterly
  triggers:
    - secret_leak_incident
    - new_observability_sink
    - new_secret_class
    - new_export_format
    - crash_report_schema_change
