version: 1
policy_id: adjutorix.secrets-policy
title: ADJUTORIX Secrets and Sensitive Data Policy
description: >-
  Canonical governance policy for identifying, classifying, receiving, storing,
  masking, transmitting, rotating, auditing, and denying secrets and sensitive
  data within ADJUTORIX. This policy exists to preserve the product invariants:
  no invisible authority, no unverifiable claim, no hidden credential flow, no
  logging of sensitive material, and no execution path whose power depends on
  undeclared secret state.
status: active
owners:
  - team: core-governance
  - team: runtime-security
  - team: ci-platform
  - team: cli-runtime
default_decision: deny
principles:
  - id: no_secret_in_visible_plaintext
    statement: Secrets must never be displayed, logged, diffed, or exported in plaintext.
  - id: no_ambient_credential_authority
    statement: Credential power must not flow implicitly through undeclared environment inheritance or hidden runtime bridges.
  - id: no_secret_persistence_without_policy
    statement: No secret may be stored on disk, in settings, or in artifacts unless the target is explicitly approved and encrypted or OS-protected.
  - id: no_secret_in_replay_or_verify_evidence
    statement: Replay, verify, ledger, and audit evidence must contain only redacted or derived representations of sensitive values.
  - id: least_secret_exposure
    statement: Secrets must be exposed only to the minimum scope, duration, process, and authority surface necessary.
shared_enums:
  decision:
    - allow
    - allow_with_warning
    - deny
  secret_class:
    - api_token
    - oauth_token
    - ssh_private_key
    - ssh_passphrase
    - password
    - session_cookie
    - signing_identity
    - package_registry_token
    - cloud_credential
    - local_secret_file
    - encryption_key
    - unknown_sensitive
  sensitivity:
    - restricted
    - confidential
    - internal_masked
  storage_class:
    - memory_only
    - os_keychain
    - encrypted_local_store
    - ephemeral_tempfile
    - forbidden_plaintext_file
    - forbidden_settings_store
  transmission_class:
    - none
    - localhost_only
    - approved_remote_tls
    - forbidden_unbounded
  visibility_class:
    - masked
    - hashed
    - fingerprint_only
    - forbidden_plaintext
  authority_surface:
    - main_process_service
    - governed_cli_command
    - governed_agent_rpc
    - governed_scheduler_job
    - os_keychain_bridge
  denied_surface:
    - renderer_direct_access
    - renderer_localstorage
    - renderer_indexeddb
    - plaintext_log_sink
    - raw_env_passthrough
    - artifact_export_plaintext
classification:
  sources:
    environment_variables:
      description: Secrets delivered via process environment.
      default_visibility: masked
      default_storage: memory_only
    keychain_or_credential_store:
      description: Secrets resolved from OS-backed secure storage.
      default_visibility: fingerprint_only
      default_storage: os_keychain
    interactive_input:
      description: Secrets entered by user at prompt or secure input control.
      default_visibility: forbidden_plaintext
      default_storage: memory_only
    config_file:
      description: Secrets found in files or project configuration.
      default_visibility: forbidden_plaintext
      default_storage: forbidden_plaintext_file
    ci_secret_injection:
      description: Secrets injected by CI platform secret store.
      default_visibility: masked
      default_storage: memory_only
  patterns:
    env_prefixes:
      - OPENAI_
      - ANTHROPIC_
      - GEMINI_
      - AWS_
      - AZURE_
      - GCP_
      - SSH_
      - GH_
      - GITHUB_
      - NPM_
      - PYPI_
      - TWINE_
      - SENTRY_
    key_names:
      - token
      - secret
      - password
      - passphrase
      - private_key
      - access_key
      - client_secret
      - signing_identity
      - auth
      - cookie
authority:
  allowed_surfaces:
    - main_process_service
    - governed_cli_command
    - governed_agent_rpc
    - governed_scheduler_job
    - os_keychain_bridge
  denied_surfaces:
    - renderer_direct_access
    - renderer_localstorage
    - renderer_indexeddb
    - plaintext_log_sink
    - raw_env_passthrough
    - artifact_export_plaintext
  requirements:
    secret_source_visible: true
    secret_class_visible: true
    secret_value_visible: false
    secret_scope_visible: true
    credential_use_reason_visible: true
handling_rules:
  collection:
    allow_from:
      - environment_variables
      - keychain_or_credential_store
      - interactive_input
      - ci_secret_injection
    deny_from:
      - renderer_localstorage
      - renderer_indexeddb
      - plaintext_project_file
    require_classification: true
    require_reason: true
    require_authority_surface: true
  storage:
    default: memory_only
    allowed:
      memory_only:
        description: Secret may be held in-process for bounded lifetime only.
        encryption_required: false
        ttl_required: true
      os_keychain:
        description: Secret may be stored using OS-backed keychain or credential manager.
        encryption_required: os_managed
        ttl_required: false
      encrypted_local_store:
        description: Secret may be stored locally only if encrypted with approved OS-bound or user-provided protection.
        encryption_required: true
        ttl_required: true
      ephemeral_tempfile:
        description: Secret may be written to a short-lived temp file only when required by external tooling and only with restrictive permissions.
        encryption_required: false
        ttl_required: true
    denied:
      forbidden_plaintext_file:
        reason: Plaintext file persistence creates durable undeclared authority.
      forbidden_settings_store:
        reason: Settings stores are not approved secret containers.
  transmission:
    default: none
    allowed:
      localhost_only:
        tls_required: false
        host_allowlist:
          - 127.0.0.1
          - localhost
      approved_remote_tls:
        tls_required: true
        host_allowlist_mode: explicit
      none:
        tls_required: false
    denied:
      forbidden_unbounded:
        reason: Unbounded or undeclared remote transmission of secrets is forbidden.
  masking:
    required_for:
      - logs
      - stdout
      - stderr
      - telemetry
      - ledger
      - verify_artifact
      - replay_artifact
      - governance_log
      - crash_report
      - exported_artifact
    default_strategy:
      api_token: prefix4_suffix4
      oauth_token: fingerprint_only
      ssh_private_key: fingerprint_only
      ssh_passphrase: constant_mask
      password: constant_mask
      session_cookie: fingerprint_only
      signing_identity: prefix4_suffix4
      package_registry_token: prefix4_suffix4
      cloud_credential: fingerprint_only
      local_secret_file: basename_only
      encryption_key: fingerprint_only
      unknown_sensitive: constant_mask
    forbidden_representations:
      - full_plaintext
      - reversible_encoding_only
      - base64_of_secret
      - hex_of_secret
runtime_requirements:
  environment_inheritance:
    default: filtered
    allow_explicit:
      - PATH
      - HOME
      - SHELL
      - TERM
      - LANG
      - LC_ALL
      - TMPDIR
      - PWD
    deny_prefixes:
      - OPENAI_
      - ANTHROPIC_
      - GEMINI_
      - AWS_
      - AZURE_
      - GCP_
      - SSH_
      - GH_
      - GITHUB_
      - NPM_
      - PYPI_
      - TWINE_
      - SENTRY_
    passthrough_requires:
      explicit_allowlist: true
      reason: true
      target_process_binding: true
  process_arguments:
    plaintext_secret_in_argv: deny
    allow_token_file_reference: true
    allow_stdin_secret_feed: true
    require_redacted_command_preview: true
  terminal_sessions:
    secret_echo_allowed: false
    secret_paste_allowed: allow_with_warning
    transcript_redaction_required: true
    transcript_export_plaintext: deny
  crash_and_error_reporting:
    attach_environment: filtered_only
    attach_argv: redacted_only
    attach_stdout_stderr: redacted_only
    attach_workspace_files: explicit_allowlist_only
artifact_rules:
  forbidden_targets:
    - ledger_plaintext_secret
    - verify_plaintext_secret
    - replay_plaintext_secret
    - exported_plaintext_bundle
    - screenshots_with_visible_secret
  allowed_derived_forms:
    - sha256_fingerprint
    - prefix_suffix_mask
    - basename_only
    - secret_present_boolean
    - secret_source_class
  export_controls:
    require_pre_export_scan: true
    deny_on_unmasked_secret: true
    deny_on_unknown_sensitive_match: true
logging_rules:
  sinks:
    stdout:
      allow_masked_only: true
    stderr:
      allow_masked_only: true
    file_logs:
      allow_masked_only: true
    telemetry:
      allow_fingerprint_only: true
    audit_logs:
      allow_fingerprint_only: true
  forbidden_patterns:
    - BEGIN OPENSSH PRIVATE KEY
    - BEGIN RSA PRIVATE KEY
    - xoxb-
    - ghp_
    - github_pat_
    - sk-
    - AKIA
    - ASIA
  required_metadata:
    - secret_class
    - source_class
    - masking_strategy
    - authority_surface
    - use_reason
rotation_and_ttl:
  require_ttl_for:
    - memory_only
    - encrypted_local_store
    - ephemeral_tempfile
  default_ttl_seconds:
    memory_only: 1800
    encrypted_local_store: 86400
    ephemeral_tempfile: 300
  rotation_required_for:
    - oauth_token
    - session_cookie
    - package_registry_token
    - cloud_credential
  revoke_on:
    - export_violation
    - plaintext_log_incident
    - unauthorized_surface_access
    - compromised_artifact
ci_and_packaging:
  ci:
    allow_sources:
      - ci_secret_injection
    deny:
      - secret_echo_in_logs
      - secret_write_to_workspace
      - secret_commit_to_artifact
    require_masking_in_step_output: true
  packaging:
    app_bundle_secret_embedding: deny
    electron_builder_env_passthrough: filtered_only
    notarization_credential_storage:
      allow:
        - os_keychain
        - ci_secret_injection
      deny:
        - forbidden_plaintext_file
  hooks:
    pre_commit_secret_scan_required: true
    pre_push_secret_scan_required: true
policy_rules:
  - id: main-process-env-token-use
    description: Main process may consume tokens from env only through explicit classified secret loading.
    when:
      authority_surface: main_process_service
      source: environment_variables
      secret_class_in:
        - api_token
        - oauth_token
        - package_registry_token
        - cloud_credential
    allow_when:
      classification_present: true
      use_reason_present: true
      target_process_bound: true
      logging_masking_enabled: true
    deny_when:
      raw_env_passthrough: true
      renderer_visibility: true
      plaintext_logging: true
    decision: allow

  - id: renderer-secret-access
    description: Renderer may not directly receive or persist secret values.
    when:
      authority_surface_in:
        - renderer_direct_access
        - renderer_localstorage
        - renderer_indexeddb
    decision: deny
    reason: Renderer surfaces are not approved secret authority boundaries.

  - id: keychain-storage
    description: OS keychain is the preferred durable storage for long-lived credentials.
    when:
      storage_class: os_keychain
    allow_when:
      authority_surface_in:
        - main_process_service
        - os_keychain_bridge
      secret_class_not_in:
        - unknown_sensitive
    deny_when:
      renderer_visibility: true
    decision: allow

  - id: tempfile-secret-materialization
    description: Tempfile materialization is allowed only when external tools cannot accept stdin or env references.
    when:
      storage_class: ephemeral_tempfile
    allow_when:
      ttl_present: true
      file_permissions_restrictive: true
      cleanup_on_exit: true
      plaintext_logging: false
      reason_present: true
    deny_when:
      target_under_workspace: true
      exportable_artifact: true
    decision: allow_with_warning

  - id: plaintext-settings-storage
    description: Settings stores must never become secret stores.
    when:
      storage_class: forbidden_settings_store
    decision: deny

  - id: secret-in-command-argv
    description: Plaintext secrets must not be placed directly in command argv.
    when:
      command_argv_contains_secret: true
    decision: deny
    reason: argv is too widely visible via logs, process tables, and transcripts.

  - id: secret-export-artifact
    description: Exported artifacts must not contain plaintext secrets.
    when:
      artifact_contains_unmasked_secret: true
    decision: deny

  - id: verify-replay-ledger-secret-ingestion
    description: Verify, replay, and ledger artifacts may only contain masked or derived secret metadata.
    when:
      artifact_kind_in:
        - verify_artifact
        - replay_artifact
        - ledger
    allow_when:
      secret_representation_in:
        - sha256_fingerprint
        - prefix_suffix_mask
        - secret_present_boolean
        - secret_source_class
    deny_when:
      secret_representation_in:
        - full_plaintext
        - reversible_encoding_only
    decision: allow
secret_detection:
  heuristics:
    regexes:
      - name: openai_style_key
        pattern: 'sk-[A-Za-z0-9]{20,}'
      - name: github_pat
        pattern: 'github_pat_[A-Za-z0-9_]{20,}'
      - name: classic_github_token
        pattern: 'gh[pousr]_[A-Za-z0-9]{20,}'
      - name: aws_access_key
        pattern: 'AKIA[0-9A-Z]{16}'
      - name: private_key_header
        pattern: '-----BEGIN [A-Z ]+PRIVATE KEY-----'
      - name: slack_token
        pattern: 'xox[baprs]-[A-Za-z0-9-]{10,}'
    keyword_context:
      - token
      - secret
      - password
      - passphrase
      - private key
      - api key
      - auth cookie
  on_unknown_sensitive_match:
    decision: deny
    require_manual_review: true
audit:
  required_fields:
    - policy_id
    - policy_version
    - decision
    - secret_class
    - source_class
    - authority_surface
    - use_reason
    - visibility_class
    - masking_strategy
    - storage_class
    - transmission_class
    - evaluated_at
  write_targets:
    - governance_log
    - security_audit_log
  forbid_value_storage: true
exceptions:
  mechanism: explicit_allowlist
  required_fields:
    - exception_id
    - owner
    - scope
    - rationale
    - expiry
    - approving_surface
  constraints:
    max_duration_days: 7
    allow_renderer_secret_access: false
    allow_plaintext_export: false
    allow_plaintext_log: false
telemetry:
  emit_on:
    - allow
    - allow_with_warning
    - deny
  required_dimensions:
    - secret_class
    - source_class
    - authority_surface
    - storage_class
    - transmission_class
    - masking_strategy
    - decision
review:
  cadence: quarterly
  triggers:
    - secret_leak_incident
    - new_secret_source
    - new_storage_backend
    - new_ci_provider
    - new_packaging_flow
