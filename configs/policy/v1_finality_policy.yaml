schema: adjutorix.v1.finality_policy
epoch: v1
status: feature_complete
scope_state: closed

allowed_v1_mutation_classes:
  - security_remediation
  - privacy_remediation
  - verification_regression_repair
  - dependency_or_platform_compatibility_repair
  - proof_asset_repair
  - non_scope_expanding_documentation_correction

forbidden_v1_mutation_classes:
  - new_user_visible_capability
  - new_package_surface
  - protocol_expansion
  - product_surface_expansion
  - undocumented_runtime_expansion
  - unverified_release_expansion

future_scope_rule: "New product scope must be declared as v2 or later."
public_claim: "ADJUTORIX v1 is feature-complete, replay-proven, remotely verified, and privacy-sealed."
