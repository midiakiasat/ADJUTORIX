version: 1
registry_id: adjutorix.governed-targets
title: ADJUTORIX Governed Targets Registry
description: >-
  Canonical registry of target classes that may be observed, previewed, mutated,
  verified, replayed, rolled back, or denied by ADJUTORIX. This file exists to
  prevent authority drift: every consequential target must have an explicit
  identity model, allowed surfaces, evidence requirements, and mutation policy
  binding before any runtime, CLI, or app surface may act on it.
status: active
owners:
  - team: core-governance
  - team: app-runtime
  - team: agent-runtime
invariants:
  - id: explicit_target_identity
    statement: Every governed target must have a stable identity shape and a defined scope boundary.
  - id: explicit_authority_binding
    statement: Every governed target must declare which authority surfaces may read, preview, mutate, or attest it.
  - id: explicit_replay_relationship
    statement: Every target that can affect authoritative state must declare whether it participates in replay and ledger lineage.
  - id: explicit_confirmation_requirement
    statement: Every target with consequential or destructive mutation potential must declare confirmation behavior.
  - id: explicit_deny_list
    statement: Targets outside the registry or marked forbidden are denied by default.
defaults:
  decision: deny
  unknown_target_behavior: deny
  unknown_authority_surface_behavior: deny
  unknown_mutation_kind_behavior: deny
  unknown_replay_relationship_behavior: deny
shared_enums:
  authority_surfaces:
    - preload_bridge
    - main_process_service
    - governed_cli_command
    - governed_agent_rpc
    - governed_scheduler_job
    - read_only_test_fixture
  denied_surfaces:
    - renderer_direct_fs
    - renderer_direct_network
    - renderer_direct_ipc_mutation
    - ad_hoc_shell_exec
    - raw_git_apply
    - ungoverned_background_task
  visibility_classes:
    - explicit
    - previewable
    - auditable
    - hidden_forbidden
  mutation_classes:
    - none
    - local_ephemeral
    - settings_persist
    - workspace_write
    - patch_apply
    - rollback
    - trust_elevation
    - shell_execution
    - artifact_export
  replay_relationships:
    - none
    - observational
    - ledger_bound
    - verify_bound
    - replay_required
  confirmation_modes:
    - none
    - recommended
    - required_consequential
    - required_destructive
  target_kinds:
    - workspace_file
    - workspace_directory
    - patch_set
    - patch_review_state
    - ledger_entry
    - ledger_selection
    - verify_result
    - diagnostics_snapshot
    - settings_blob
    - workspace_trust_state
    - command_invocation
    - terminal_session
    - rpc_method
    - exported_artifact
    - app_session
    - forbidden_surface
targets:
  - id: workspace.source-file
    kind: workspace_file
    status: active
    description: Source-controlled file within the active trusted workspace.
    identity:
      required_fields:
        - workspace_id
        - relative_path
      optional_fields:
        - file_hash
        - language
      canonical_scope: workspace-relative path
    visibility:
      class: explicit
      target_visible: true
      consequence_visible: true
      diff_preview_required_for_mutation: true
    authority:
      read:
        allow:
          - preload_bridge
          - main_process_service
          - governed_cli_command
          - governed_agent_rpc
      preview:
        allow:
          - preload_bridge
          - main_process_service
          - governed_cli_command
          - governed_agent_rpc
      mutate:
        allow:
          - main_process_service
          - governed_cli_command
          - governed_agent_rpc
        deny:
          - renderer_direct_fs
          - renderer_direct_ipc_mutation
          - ad_hoc_shell_exec
          - raw_git_apply
      attest:
        allow:
          - governed_agent_rpc
          - governed_cli_command
          - main_process_service
    mutation:
      class: workspace_write
      severity: consequential
      confirmation: required_consequential
      trusted_workspace_required: true
      readonly_media_behavior: deny
      destructive_operations:
        - replace
        - delete
        - rename
      required_evidence:
        - file_diff
        - target_identity
        - governance_decision
        - verify_assessment
      forbidden_without:
        - confirmation
        - fresh_verify
        - visible_target
    replay:
      relationship: replay_required
      ledger_binding: required
      verify_binding: required
      rollback_supported: true

