      target_visible: false
      consequence_visible: false
      diff_preview_required_for_mutation: false
    authority:
      read:
        allow: []
      preview:
        allow: []
      mutate:
        allow: []
        deny:
          - renderer_direct_fs
          - renderer_direct_network
          - renderer_direct_ipc_mutation
      attest:
        allow:
          - governed_cli_command
          - governed_agent_rpc
          - main_process_service
    mutation:
      class: none
      severity: destructive
      confirmation: none
      trusted_workspace_required: false
      readonly_media_behavior: deny
      required_evidence:
        - attempted_surface
        - blocking_policy_reference
    replay:
      relationship: none
      ledger_binding: false
      verify_binding: false
      rollback_supported: false

authority_matrix:
  preload_bridge:
    may_read:
      - workspace.source-file
      - workspace.generated-file
      - workspace.directory
      - patch.proposal
      - patch.review-state
      - ledger.entry
      - ledger.selection
      - verify.result
      - diagnostics.snapshot
      - settings.workspace
      - settings.application
      - workspace.trust-state
      - terminal.session
      - app.session-state
    may_preview:
      - workspace.source-file
      - patch.proposal
      - ledger.entry
      - ledger.selection
      - verify.result
      - diagnostics.snapshot
      - settings.workspace
      - settings.application
      - app.session-state
    may_mutate:
      - ledger.selection
      - app.session-state
    may_never_mutate:
      - workspace.source-file
      - workspace.generated-file
      - workspace.directory
      - patch.proposal
      - ledger.entry
      - verify.result
      - workspace.trust-state
      - shell.command-invocation
      - artifact.export

  main_process_service:
    may_read: all
    may_preview: all
    may_mutate:
      - workspace.source-file
      - workspace.generated-file
      - workspace.directory
      - patch.proposal
      - patch.review-state
      - ledger.entry
      - ledger.selection
      - settings.workspace
      - settings.application
      - workspace.trust-state
      - shell.command-invocation
      - terminal.session
      - artifact.export
      - app.session-state
    may_attest:
      - all

  governed_cli_command:
    may_read: all
    may_preview: all
    may_mutate:
      - workspace.source-file
      - workspace.generated-file
      - workspace.directory
      - patch.proposal
      - patch.review-state
      - ledger.entry
      - settings.workspace
      - settings.application
      - workspace.trust-state
      - shell.command-invocation
      - artifact.export
    may_attest:
      - all

  governed_agent_rpc:
    may_read: all
    may_preview: all
    may_mutate:
      - workspace.source-file
      - workspace.generated-file
      - workspace.directory
      - patch.proposal
      - patch.review-state
      - ledger.entry
      - verify.result
      - shell.command-invocation
      - artifact.export
    may_attest:
      - all

denials:
  - id: deny-unregistered-target
    when:
      target_not_in_registry: true
    decision: deny
    reason: No target may inherit governance implicitly.
  - id: deny-forbidden-surface
    when:
      target_status: forbidden
    decision: deny
    reason: Forbidden surfaces may only be reported and blocked, never used.
  - id: deny-hidden-mutation-authority
    when:
      authority_surface_not_declared_for_target: true
    decision: deny
    reason: Mutation authority must be explicitly bound to target classes.
  - id: deny-replay-required-target-without-lineage
    when:
      replay_relationship: replay_required
      lineage_missing: true
    decision: deny
    reason: Replay-required targets must remain tied to authoritative lineage.
  - id: deny-destructive-target-without-confirmation-mode
    when:
      destructive_mutation_supported: true
      confirmation_mode_missing: true
    decision: deny
    reason: Destructive targets require explicit confirmation semantics.
attestation:
  required_fields:
    - registry_id
    - registry_version
    - target_id
    - target_kind
    - authority_surface
    - action
    - decision
    - target_identity
    - evidence_summary
    - evaluated_at
  storage:
    - ledger
    - governance_log
    - verify_artifact
review:
  cadence: quarterly
  triggers:
    - new_target_class
    - new_authority_surface
    - renderer_authority_incident
    - apply_gate_incident
    - verify_gate_incident
    - replay_drift_incident
