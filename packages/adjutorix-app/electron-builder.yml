# ADJUTORIX APP — ELECTRON BUILDER CONFIG
# Deterministic, reproducible, signed, multi-platform packaging
# NO PLACEHOLDERS

appId: com.adjutorix.app
productName: Adjutorix
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

# Reproducibility
compression: maximum
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false

# Directories
directories:
  app: .
  output: release
  buildResources: assets

# Files included in app.asar
files:
  - dist/**
  - package.json
  - "!**/*.map"          # exclude source maps from final package
  - "!**/*.test.*"
  - "!**/__tests__/**"

# Extra resources (kept outside asar for runtime access)
extraResources:
  - from: assets/
    to: assets
    filter:
      - "**/*"
  - from: configs/
    to: configs
    filter:
      - "**/*"

# ASAR packaging
asar: true
asarUnpack:
  - "**/*.node"
  - "**/bin/**"

# Publish (disabled by default; explicit pipeline should handle this)
publish: null

# macOS
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

# DMG layout
dmg:
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Adjutorix

# Linux
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"

# File associations (example for project files)
fileAssociations:
  - ext: adj
    name: Adjutorix Project
    description: Adjutorix Workspace File
    role: Editor

# Protocols (deep link support)
protocols:
  - name: Adjutorix Protocol
    schemes: ["adjutorix"]

# Environment-driven signing (no hardcoded secrets)
# macOS codesign uses environment variables (CSC_LINK, CSC_KEY_PASSWORD)
# Windows signing uses WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD

# Deterministic build hooks
afterPack: ./scripts/after-pack.mjs
afterSign: ./scripts/after-sign.mjs

# Metadata
copyright: "Copyright © Adjutorix"

# Safety: fail on warnings
forceCodeSigning: false
removePackageScripts: true

# Extra metadata injected into app
extraMetadata:
  main: dist/main.js
